name: Build Android App (arm64)

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up NDK
        run: |
          SDK_ROOT=$ANDROID_HOME
          NDK_VERSION=26.1.10909125
          echo "y" | sudo $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "ndk;$NDK_VERSION"
          echo "ANDROID_NDK_HOME=$SDK_ROOT/ndk/$NDK_VERSION" >> $GITHUB_ENV

      - name: Create project directories
        run: |
          mkdir -p app/src/main/java/com/example/videoplayer
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/res/drawable
          mkdir -p gradle/wrapper

      - name: Generate Android project files
        run: |
          # settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "VideoPlayer"
          include ':app'
          EOF

          # build.gradle (project)
          cat > build.gradle << 'EOF'
          buildscript {
              ext {
                  compose_version = '1.6.8'
                  media3_version = '1.3.1'
              }
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.23"
              }
          }
          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF

          # gradle-wrapper.properties
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # app/build.gradle
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }

          android {
              namespace 'com.example.videoplayer'
              compileSdk 34

              defaultConfig {
                  applicationId "com.example.videoplayer"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"

                  externalNativeBuild {
                      cmake {
                          cppFlags "-std=c++17"
                          arguments "-DANDROID_STL=c++_shared"
                          abiFilters "arm64-v8a"
                      }
                  }
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }

              buildFeatures {
                  compose true
              }

              composeOptions {
                  kotlinCompilerExtensionVersion = "$compose_version"
              }

              externalNativeBuild {
                  cmake {
                      path "src/main/cpp/CMakeLists.txt"
                  }
              }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
              implementation 'androidx.activity:activity-compose:1.8.2'
              implementation "androidx.compose.ui:ui:$compose_version"
              implementation "androidx.compose.ui:ui-tooling-preview:$compose_version"
              implementation "androidx.compose.material3:material3:1.2.1"

              implementation "androidx.media3:media3-exoplayer:$media3_version"
              implementation "androidx.media3:media3-ui:$media3_version"

              debugImplementation "androidx.compose.ui:ui-tooling:$compose_version"
          }
          EOF

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.videoplayer">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.VideoPlayer">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # res/values/strings.xml
          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">Video Player</string>
          </resources>
          EOF

          # res/values/themes.xml
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <resources>
              <style name="Theme.VideoPlayer" parent="android:Theme.Material.Light.NoActionBar">
                  <item name="android:windowBackground">@android:color/black</item>
              </style>
          </resources>
          EOF

      - name: Copy player.kt to source
        run: cp player.kt app/src/main/java/com/example/videoplayer/MainActivity.kt

      - name: Build and install FFmpeg for arm64
        run: |
          NDK=$ANDROID_NDK_HOME
          API=24
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          TARGET="aarch64-linux-android"
          SYSROOT=$TOOLCHAIN/sysroot
          CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
          CXX=$TOOLCHAIN/bin/${TARGET}${API}-clang++
          AR=$TOOLCHAIN/bin/llvm-ar
          RANLIB=$TOOLCHAIN/bin/llvm-ranlib

          # Download FFmpeg
          wget -q https://ffmpeg.org/releases/ffmpeg-6.0.tar.bz2
          tar xjf ffmpeg-6.0.tar.bz2
          cd ffmpeg-6.0

          # Configure minimal build (only video decoders, no audio, no Vulkan/VAAPI/CUDA)
          ./configure \
              --prefix=$(pwd)/install \
              --enable-cross-compile \
              --target-os=android \
              --arch=arm64 \
              --cc=$CC \
              --cxx=$CXX \
              --ar=$AR \
              --ranlib=$RANLIB \
              --sysroot=$SYSROOT \
              --extra-cflags="-fPIC -O3" \
              --disable-static \
              --enable-shared \
              --disable-everything \
              --enable-decoder=h264 \
              --enable-decoder=hevc \
              --enable-decoder=mpeg4 \
              --enable-decoder=vp8 \
              --enable-decoder=vp9 \
              --enable-decoder=av1 \
              --enable-parser=h264 \
              --enable-parser=hevc \
              --enable-parser=mpeg4video \
              --enable-parser=vp8 \
              --enable-parser=vp9 \
              --enable-demuxer=mov \
              --enable-demuxer=matroska \
              --enable-protocol=file \
              --disable-doc \
              --disable-programs \
              --disable-avdevice \
              --disable-postproc \
              --disable-avfilter \
              --disable-encoders \
              --disable-muxers \
              --disable-bsfs \
              --disable-devices \
              --disable-filters \
              --disable-hwaccels \
              --disable-vulkan \
              --disable-vaapi \
              --disable-cuda

          make -j$(nproc)
          make install
          cd ..

          # Copy built libraries to cpp/libs/arm64-v8a
          mkdir -p app/src/main/cpp/libs/arm64-v8a
          cp ffmpeg-6.0/install/lib/*.so app/src/main/cpp/libs/arm64-v8a/

      - name: Create native wrapper and CMakeLists.txt
        run: |
          # Native wrapper (ffmpeg_wrapper.cpp)
          cat > app/src/main/cpp/ffmpeg_wrapper.cpp << 'EOF'
          #include <jni.h>
          #include <string>
          #include <android/bitmap.h>
          #include <android/log.h>

          extern "C" {
          #include <libavcodec/avcodec.h>
          #include <libavformat/avformat.h>
          #include <libswscale/swscale.h>
          }

          #define LOG_TAG "FFmpegWrapper"
          #define LOGI(...) __android_log_print(ANDROID_LOG_INFO, LOG_TAG, __VA_ARGS__)
          #define LOGE(...) __android_log_print(ANDROID_LOG_ERROR, LOG_TAG, __VA_ARGS__)

          static AVFormatContext* fmt_ctx = nullptr;
          static AVCodecContext* codec_ctx = nullptr;
          static AVStream* video_stream = nullptr;
          static int video_stream_index = -1;
          static SwsContext* sws_ctx = nullptr;

          extern "C" JNIEXPORT jboolean JNICALL
          Java_com_example_videoplayer_MainActivity_initDecoder(JNIEnv* env, jobject /*this*/, jstring path) {
              const char* filename = env->GetStringUTFChars(path, nullptr);
              LOGI("Opening file: %s", filename);

              // Open file
              if (avformat_open_input(&fmt_ctx, filename, nullptr, nullptr) < 0) {
                  LOGE("Could not open input");
                  return JNI_FALSE;
              }
              if (avformat_find_stream_info(fmt_ctx, nullptr) < 0) {
                  LOGE("Could not find stream info");
                  return JNI_FALSE;
              }

              // Find video stream
              for (unsigned i = 0; i < fmt_ctx->nb_streams; i++) {
                  if (fmt_ctx->streams[i]->codecpar->codec_type == AVMEDIA_TYPE_VIDEO) {
                      video_stream_index = i;
                      video_stream = fmt_ctx->streams[i];
                      break;
                  }
              }
              if (video_stream_index == -1) {
                  LOGE("No video stream");
                  return JNI_FALSE;
              }

              // Find decoder
              const AVCodec* codec = avcodec_find_decoder(video_stream->codecpar->codec_id);
              if (!codec) {
                  LOGE("Unsupported codec");
                  return JNI_FALSE;
              }

              // Allocate codec context
              codec_ctx = avcodec_alloc_context3(codec);
              avcodec_parameters_to_context(codec_ctx, video_stream->codecpar);
              if (avcodec_open2(codec_ctx, codec, nullptr) < 0) {
                  LOGE("Could not open codec");
                  return JNI_FALSE;
              }

              // Prepare scaling context (RGB for bitmap)
              sws_ctx = sws_getContext(
                  codec_ctx->width, codec_ctx->height, codec_ctx->pix_fmt,
                  codec_ctx->width, codec_ctx->height, AV_PIX_FMT_RGBA,
                  SWS_BILINEAR, nullptr, nullptr, nullptr
              );

              env->ReleaseStringUTFChars(path, filename);
              return JNI_TRUE;
          }

          extern "C" JNIEXPORT jobject JNICALL
          Java_com_example_videoplayer_MainActivity_getFrameAt(JNIEnv* env, jobject /*this*/, jlong us) {
              if (!fmt_ctx || !codec_ctx) return nullptr;

              // Seek to keyframe before target timestamp
              int64_t timestamp = us; // in microseconds
              av_seek_frame(fmt_ctx, video_stream_index, timestamp, AVSEEK_FLAG_BACKWARD);

              // Decode until we get a frame near the target
              AVPacket* pkt = av_packet_alloc();
              AVFrame* frame = av_frame_alloc();
              AVFrame* rgb_frame = av_frame_alloc();

              // Allocate buffer for RGB frame
              int num_bytes = av_image_get_buffer_size(AV_PIX_FMT_RGBA, codec_ctx->width, codec_ctx->height, 1);
              uint8_t* buffer = (uint8_t*)av_malloc(num_bytes);
              av_image_fill_arrays(rgb_frame->data, rgb_frame->linesize, buffer, AV_PIX_FMT_RGBA,
                                  codec_ctx->width, codec_ctx->height, 1);

              jobject bitmap = nullptr;
              while (av_read_frame(fmt_ctx, pkt) >= 0) {
                  if (pkt->stream_index == video_stream_index) {
                      if (avcodec_send_packet(codec_ctx, pkt) == 0) {
                          if (avcodec_receive_frame(codec_ctx, frame) == 0) {
                              // Found a frame, convert to RGB
                              sws_scale(sws_ctx, frame->data, frame->linesize,
                                        0, codec_ctx->height,
                                        rgb_frame->data, rgb_frame->linesize);

                              // Create Bitmap
                              jclass bitmap_cls = env->FindClass("android/graphics/Bitmap");
                              jmethodID create_bitmap = env->GetStaticMethodID(
                                  bitmap_cls, "createBitmap",
                                  "(IILandroid/graphics/Bitmap$Config;)Landroid/graphics/Bitmap;");
                              jclass config_cls = env->FindClass("android/graphics/Bitmap$Config");
                              jmethodID config_valueOf = env->GetStaticMethodID(
                                  config_cls, "valueOf",
                                  "(Ljava/lang/String;)Landroid/graphics/Bitmap$Config;");
                              jstring config_name = env->NewStringUTF("ARGB_8888");
                              jobject config = env->CallStaticObjectMethod(config_cls, config_valueOf, config_name);
                              bitmap = env->CallStaticObjectMethod(
                                  bitmap_cls, create_bitmap,
                                  codec_ctx->width, codec_ctx->height, config);

                              // Copy pixels
                              AndroidBitmapInfo info;
                              AndroidBitmap_getInfo(env, bitmap, &info);
                              void* pixels;
                              AndroidBitmap_lockPixels(env, bitmap, &pixels);
                              uint8_t* src = rgb_frame->data[0];
                              uint8_t* dst = (uint8_t*)pixels;
                              int stride = info.stride;
                              for (int y = 0; y < info.height; y++) {
                                  memcpy(dst + y * stride, src + y * rgb_frame->linesize[0], info.width * 4);
                              }
                              AndroidBitmap_unlockPixels(env, bitmap);

                              env->DeleteLocalRef(config_name);
                              break;
                          }
                      }
                  }
                  av_packet_unref(pkt);
              }

              av_packet_free(&pkt);
              av_frame_free(&frame);
              av_frame_free(&rgb_frame);
              av_free(buffer);
              return bitmap;
          }

          extern "C" JNIEXPORT void JNICALL
          Java_com_example_videoplayer_MainActivity_releaseDecoder(JNIEnv* env, jobject /*this*/) {
              if (codec_ctx) avcodec_free_context(&codec_ctx);
              if (fmt_ctx) avformat_close_input(&fmt_ctx);
              if (sws_ctx) sws_freeContext(sws_ctx);
          }
          EOF

          # CMakeLists.txt
          cat > app/src/main/cpp/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.18)
          project("ffmpeg_wrapper")

          # Set paths to FFmpeg libraries
          set(FFMPEG_LIB_DIR ${CMAKE_SOURCE_DIR}/libs/${ANDROID_ABI})

          add_library(ffmpeg_wrapper SHARED ffmpeg_wrapper.cpp)

          target_include_directories(ffmpeg_wrapper PRIVATE
              ${CMAKE_SOURCE_DIR}/../../../ffmpeg-6.0/install/include
          )

          # Find all .so files and link them
          file(GLOB FFMPEG_LIBS ${FFMPEG_LIB_DIR}/*.so)

          target_link_libraries(ffmpeg_wrapper
              ${FFMPEG_LIBS}
              log
              android
              z
          )
          EOF

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-player-arm64-debug
          path: app/build/outputs/apk/debug/app-debug.apk
